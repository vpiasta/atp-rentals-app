<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="32" height="32" role="img">
  <title>Trusted Panama Stays</title>

  <!-- Flag shifted up 20px: was y=130-254, now y=110-234 -->
  <rect x="30" y="110" width="100" height="62" fill="white"/>
  <rect x="130" y="110" width="100" height="62" fill="#cc0000"/>
  <rect x="30" y="172" width="100" height="62" fill="#1a3a6b"/>
  <rect x="130" y="172" width="100" height="62" fill="white"/>
  <rect x="30" y="110" width="200" height="124" fill="none" stroke="#1a3a6b" stroke-width="2"/>

  <!-- Blue star top-left: center 80,141 -->
  <polygon points="80,127 82.5,135 91,135 84,140 86.5,148 80,143 73.5,148 76,140 69,135 77.5,135" fill="#1a3a6b"/>

  <!-- Red star bottom-right: center 180,203 -->
  <polygon points="180,189 182.5,197 191,197 184,202 186.5,210 180,205 173.5,210 176,202 169,197 177.5,197" fill="#cc0000"/>

  <!-- Roof: peak higher to compensate, base just above flag -->
  <polyline points="5,108 130,8 255,108"
            fill="none" stroke="#1a3a6b" stroke-width="5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gold checkmark -->
  <path d="M54,118 L98,226 L218,8"
        fill="none"
        stroke="#b8860b"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
