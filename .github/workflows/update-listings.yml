name: Update ATP Listings

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update on live site
        run: |
          curl -X POST https://trustedpanamastays.com/api/reload-pdf \
            -H "Content-Type: application/json" \
            -d '{"secret": "${{ secrets.ADMIN_SECRET }}"}'
